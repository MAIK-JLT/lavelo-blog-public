<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Lavelo Blog</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at top left, #c7bfb6 0%, #b4aca2 35%, #a99f96 100%);
            margin: 0;
            font-family: 'Sora', sans-serif;
            color: #2b2521;
            padding: 24px;
        }

        .login-container {
            background: #f6eee6;
            padding: 3rem;
            border-radius: 28px;
            box-shadow: 0 18px 50px rgba(33, 26, 22, 0.18);
            text-align: center;
            max-width: 420px;
            width: 100%;
            border: 1px solid rgba(43, 37, 33, 0.08);
        }

        .logo {
            font-size: 2.6rem;
            margin-bottom: 1rem;
        }

        h1 {
            color: #2b2521;
            margin-bottom: 0.5rem;
            font-size: 2rem;
            font-family: 'Fraunces', serif;
            letter-spacing: 0.3px;
        }

        .subtitle {
            color: #8c837b;
            margin-bottom: 2rem;
            font-size: 0.98rem;
        }

        .form {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            text-align: left;
        }

        .form label {
            font-size: 0.9rem;
            color: #5c534b;
            font-weight: 600;
        }

        .form input {
            padding: 0.85rem 1rem;
            border-radius: 14px;
            border: 1px solid rgba(43, 37, 33, 0.14);
            font-size: 1rem;
            background: #fffaf4;
        }

        .actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 0.5rem;
        }

        .btn-primary {
            flex: 1;
            background: linear-gradient(135deg, #b86f3d 0%, #e3a857 100%);
            border: none;
            color: #fffaf3;
            padding: 0.9rem 1rem;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-secondary {
            flex: 1;
            background: #efe5da;
            border: none;
            color: #2b2521;
            padding: 0.9rem 1rem;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .help {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #8c837b;
            text-align: center;
        }

        .error-message {
            background: rgba(192, 79, 60, 0.15);
            color: #9c2f25;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            display: none;
            border: 1px solid rgba(192, 79, 60, 0.35);
        }

        .error-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🏃‍♂️</div>
        <h1>Lavelo Blog</h1>
        <p class="subtitle">Inicia sesión para gestionar tu contenido</p>

        <div id="errorMessage" class="error-message"></div>

        <form id="loginForm" class="form">
            <label for="email">Email</label>
            <input id="email" type="email" autocomplete="email" required>

            <label for="password">Contraseña</label>
            <input id="password" type="password" autocomplete="current-password" required>

            <label for="name">Nombre (solo registro)</label>
            <input id="name" type="text" autocomplete="name" placeholder="Opcional">

            <div class="actions">
                <button type="submit" class="btn-primary" id="loginBtn">Entrar</button>
                <button type="button" class="btn-secondary" id="registerBtn">Crear cuenta</button>
            </div>
        </form>
        <div class="help">Usa "Crear cuenta" la primera vez. Después entra con "Entrar".</div>
    </div>

    <script>
        const errorMessage = document.getElementById('errorMessage');
        const loginForm = document.getElementById('loginForm');
        const registerBtn = document.getElementById('registerBtn');
        const loginBtn = document.getElementById('loginBtn');

        function showError(msg) {
            errorMessage.textContent = msg;
            errorMessage.classList.add('show');
        }

        function clearError() {
            errorMessage.textContent = '';
            errorMessage.classList.remove('show');
        }

        async function login(email, password) {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ email, password })
            });
            if (!res.ok) {
                const data = await res.json().catch(() => ({}));
                throw new Error(data.detail || 'Login incorrecto');
            }
            window.location.href = '/panel/';
        }

        async function register(name, email, password) {
            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ name, email, password })
            });
            if (!res.ok) {
                const data = await res.json().catch(() => ({}));
                throw new Error(data.detail || 'No se pudo crear la cuenta');
            }
            window.location.href = '/panel/';
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearError();
            loginBtn.disabled = true;
            try {
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value.trim();
                if (!email || !password) throw new Error('Email y contraseña son obligatorios');
                await login(email, password);
            } catch (err) {
                showError(err.message);
            } finally {
                loginBtn.disabled = false;
            }
        });

        registerBtn.addEventListener('click', async () => {
            clearError();
            registerBtn.disabled = true;
            try {
                const name = document.getElementById('name').value.trim() || null;
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value.trim();
                if (!email || !password) throw new Error('Email y contraseña son obligatorios');
                await register(name, email, password);
            } catch (err) {
                showError(err.message);
            } finally {
                registerBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
