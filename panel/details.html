<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles del Post - Lavelo Blog</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/chat.css">
    <style>
        body {
            font-family: 'Sora', sans-serif;
            background: radial-gradient(circle at top left, #c7bfb6 0%, #b4aca2 35%, #a99f96 100%);
            min-height: 100vh;
            padding: 24px;
            margin: 0;
            color: #2b2521;
        }
        
        .details-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .details-header {
            background: #f6eee6;
            padding: 30px;
            border-radius: 24px;
            margin-bottom: 20px;
            box-shadow: 0 14px 38px rgba(33, 26, 22, 0.18);
            border: 1px solid rgba(43, 37, 33, 0.08);
        }
        
        .details-header h1 {
            color: #2b2521;
            margin-bottom: 15px;
            font-size: 2em;
            font-family: 'Fraunces', serif;
        }
        
        .details-header p {
            color: #8c837b;
            margin: 8px 0;
            font-size: 1.1em;
        }
        
        .details-content {
            background: #f6eee6;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 14px 38px rgba(33, 26, 22, 0.18);
            margin-bottom: 20px;
            border: 1px solid rgba(43, 37, 33, 0.08);
        }
        
        .phase-section {
            margin-bottom: 30px;
        }
        
        .phase-title {
            font-size: 1.8em;
            color: #2b2521;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 3px solid #c0773c;
            font-family: 'Fraunces', serif;
        }
        
        .text-item {
            margin-bottom: 30px;
            padding: 20px;
            background: #efe5da;
            border-radius: 16px;
            border-left: 4px solid #c0773c;
            border: 1px solid rgba(43, 37, 33, 0.08);
        }
        
        .text-item h3 {
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3em;
        }
        
        .content-editor {
            width: 100%;
            min-height: 200px;
            padding: 15px;
            border: 2px solid rgba(43, 37, 33, 0.14);
            border-radius: 12px;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: vertical;
            transition: border-color 0.3s, box-shadow 0.3s;
            background: #fffaf4;
        }
        
        .content-editor:focus {
            outline: none;
            border-color: #c0773c;
            box-shadow: 0 0 0 3px rgba(192, 119, 60, 0.2);
        }
        
        .content-editor.modified {
            border-color: #e3a857;
            background: rgba(227, 168, 87, 0.12);
        }
        
        .save-btn-container {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .save-btn {
            padding: 10px 20px;
            background: #c0773c;
            color: #fffaf3;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            display: none;
        }
        
        .save-btn:hover {
            background: #b86f3d;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(33, 26, 22, 0.2);
        }
        
        .save-btn.show {
            display: inline-block;
        }
        
        .ai-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #b86f3d 0%, #e3a857 100%);
            color: #fffaf3;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .ai-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(33, 26, 22, 0.25);
        }
        
        .save-status {
            color: #28a745;
            font-size: 14px;
            font-weight: 600;
            display: none;
            animation: fadeIn 0.3s;
        }
        
        .save-status.show {
            display: inline-block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        #message-container {
            margin-top: 20px;
            min-height: 60px;
        }
        
        .message {
            padding: 20px 25px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            animation: slideIn 0.4s ease-out;
            background: #f6eee6;
            box-shadow: 0 8px 20px rgba(33, 26, 22, 0.15);
        }
        
        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .message.success {
            background: rgba(63, 122, 91, 0.18);
            color: #2f6a4e;
            border: 2px solid rgba(63, 122, 91, 0.4);
        }
        
        .message.error {
            background: rgba(192, 79, 60, 0.16);
            color: #9c2f25;
            border: 2px solid rgba(192, 79, 60, 0.4);
        }
        
        .message.loading {
            background: rgba(192, 119, 60, 0.14);
            color: #8a5a2f;
            border: 2px solid rgba(192, 119, 60, 0.35);
        }
        
        .actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            padding: 20px;
            background: #f6eee6;
            border-radius: 20px;
            box-shadow: 0 14px 38px rgba(33, 26, 22, 0.18);
            border: 1px solid rgba(43, 37, 33, 0.08);
        }
        
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 6px 16px rgba(33, 26, 22, 0.15);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(33, 26, 22, 0.22);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #b86f3d 0%, #e3a857 100%);
            color: #fffaf3;
        }
        
        .btn-success {
            background: #3f7a5b;
            color: #fffaf3;
        }
        
        .btn-success:hover {
            background: #366a50;
        }
        
        .btn-secondary {
            background: #4f4741;
            color: #fffaf3;
        }
        
        .btn-secondary:hover {
            background: #5a524b;
        }
        
        .status-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 1em;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(33, 26, 22, 0.1);
        }
        
        .status-awaiting {
            background: rgba(227, 168, 87, 0.25);
            color: #2b2521;
            border: 1px solid rgba(227, 168, 87, 0.5);
        }
        
        .file-upload {
            margin-top: 15px;
            padding: 15px;
            border: 2px dashed rgba(43, 37, 33, 0.2);
            border-radius: 10px;
            text-align: center;
            background: #fffaf4;
        }
        
        .file-upload input[type="file"] {
            display: none;
        }
        
        .file-upload label {
            cursor: pointer;
            color: #c0773c;
        }
        
        .preview-container {
            margin-top: 15px;
            padding: 15px;
            border: 1px solid rgba(43, 37, 33, 0.15);
            border-radius: 10px;
            background: #fffaf4;
        }
        
        .preview-container img,
        .preview-container video {
            max-width: 100%;
            border-radius: 10px;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: #c0773c;
            font-size: 1.2em;
        }
        
        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(43, 37, 33, 0.15);
            border-top: 4px solid #c0773c;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .upload-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(33, 26, 22, 0.55);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        
        .upload-overlay.show {
            display: flex;
        }
        
        .upload-progress {
            background: #f6eee6;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 18px 45px rgba(33, 26, 22, 0.3);
            border: 1px solid rgba(43, 37, 33, 0.12);
        }
        
        .upload-progress .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid rgba(43, 37, 33, 0.15);
            border-top: 6px solid #c0773c;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        .upload-progress h3 {
            color: #2b2521;
            margin: 0;
            font-size: 1.3em;
            font-family: 'Fraunces', serif;
        }
        
        .upload-progress p {
            color: #8c837b;
            margin: 10px 0 0 0;
        }
    </style>
</head>
<body>
    <div class="details-container">
        <div class="details-header">
            <h1 id="post-title">Cargando...</h1>
            <p><strong>Código:</strong> <span id="post-codigo"></span></p>
            <p><strong>Estado:</strong> <span id="post-estado" class="status-badge"></span></p>
        </div>
        
        <div class="details-content">
            <div id="phase-content" class="loading">
                Cargando contenido...
            </div>
        </div>
        
        <div class="actions">
            <button class="btn btn-secondary" onclick="cancelar()">← Volver</button>
        </div>
        
        <div id="message-container"></div>
    </div>
    
    <!-- Overlay de subida -->
    <div id="upload-overlay" class="upload-overlay">
        <div class="upload-progress">
            <div class="spinner"></div>
            <h3 id="upload-title">Subiendo imagen...</h3>
            <p id="upload-message">Por favor espera, esto puede tardar unos segundos</p>
        </div>
    </div>
    
    <!-- Modal de advertencia para editar fase validada -->
    <div id="warning-modal" class="upload-overlay" style="display: none;">
        <div class="upload-progress" style="max-width: 500px;">
            <h3 style="color: #b86f3d; margin-bottom: 20px;">⚠️ Advertencia</h3>
            <p style="color: #2b2521; font-size: 1.05em; margin-bottom: 15px;">Vas a editar una fase ya validada.</p>
            <div id="warning-content" style="background: rgba(227, 168, 87, 0.18); padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: left; border: 1px solid rgba(227, 168, 87, 0.35);">
                <p style="margin: 0; color: #6b4a2a; font-weight: bold;">Si guardas cambios, se resetearán:</p>
                <ul id="reset-list" style="margin: 10px 0 0 20px; color: #6b4a2a;"></ul>
            </div>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="btn-secondary" onclick="cancelWarning()" style="padding: 12px 30px; border: none; border-radius: 12px; cursor: pointer; font-size: 1em;">Cancelar</button>
                <button class="ai-btn" onclick="confirmEdit()" style="padding: 12px 30px; font-size: 1em;">Continuar</button>
            </div>
        </div>
    </div>
    
    <!-- Widget de Chat con IA -->
    <button class="chat-fab" onclick="toggleChat()" title="Chat con IA">
        💬
    </button>
    
    <div id="chat-modal" class="chat-modal" style="display: none;">
        <div class="chat-header">
            <h3>✨ Asistente IA</h3>
            <button class="chat-close" onclick="toggleChat()">✕</button>
        </div>
        <div id="chat-messages" class="chat-messages">
            <!-- Mensajes del chat -->
        </div>
        <div class="chat-input-container">
            <input 
                type="text" 
                id="chat-input" 
                class="chat-input" 
                placeholder="Escribe tu mensaje..."
                autocomplete="off"
            >
            <button class="chat-send" onclick="sendChatMessage()">Enviar</button>
        </div>
    </div>
    
    <script src="js/details.js?v=3.7"></script>
    <script src="js/chat.js?v=3.7"></script>
</body>
</html>
